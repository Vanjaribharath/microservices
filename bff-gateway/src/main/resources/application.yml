server:
  port: 8080

spring:
  application:
    name: bff-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/training

  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
            - id: catalog-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/catalog/**
      default-filters:
        - AddRequestHeader=X-Gateway, bff

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  health:
    db:
      enabled: false
    redis:
      enabled: false
  tracing:
    sampling:
          probability: 1.0   # 100% in dev
          propagation:
          type: w3c
    propagation:
      type: w3c
  zipkin:
    tracing:
          endpoint: http://localhost:9411/api/v2/spans
  observations:
    annotations:
          enabled: true

# ===== Custom logging config (used by logback) =====
app:
  logging:
    service-name: bff-gateway
    db-url: jdbc:postgresql://localhost:5432/microservices
    db-username: postgres
    db-password: 1234
    table-name: public.application_logs


logging:
  pattern:
    correlation: "[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]"


