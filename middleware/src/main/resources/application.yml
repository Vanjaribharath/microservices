server:
  port: 8081

spring:
  application:
    name: middleware
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
          probability: 1.0   # 100% in dev
          propagation:
          type: w3c
  zipkin:
    tracing:
          endpoint: http://localhost:9411/api/v2/spans
  observations:
    annotations:
          enabled: true
#        include: health,metrics,prometheus

system-api:
  url: http://localhost:8081

logging:
  level:
    com.capgemini.training.adapter.out.feign: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG
  pattern:
    correlation: "[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]"


resilience4j:
  circuitbreaker:
    instances:
      systemApi:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      systemApi:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
  bulkhead:
    instances:
      systemApi:
        maxConcurrentCalls: 20
  timelimiter:
    instances:
      systemApi:
        timeoutDuration: 5s

